path = "src/bin/p5_6b_eigenvalue_spectrum.rs"

[[bin]]
name = "p5_9_ako_apples_to_apples"
path = "src/bin/p5_9_ako_apples_to_apples.rs"

[[bin]]
name = "p6_2_mass_spectrum"
path = "src/bin/p6_2_mass_spectrum.rs"

[[bin]]
