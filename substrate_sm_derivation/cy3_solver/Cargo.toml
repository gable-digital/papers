[[bin]]
name = "p_basis_convergence_diag"
path = "src/bin/p_basis_convergence_diag.rs"

[dependencies]
pwos-math = { path = "../../../../products/pwos/libs/pwos-math", default-features = false, features = ["ndarray", "kernels", "polynomial", "linalg", "infra", "opt", "sample", "pde", "hol-proofs", "std", "nn", "stats", "precision-bigfloat"] }
astro-float = { version = "0.9", default-features = false, features = ["std"] }
rayon = "1.10"
crossbeam-channel = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
cudarc = { version = "0.16", features = ["cuda-11080", "cublas", "driver", "nvrtc", "f16"], optional = true }
num-complex = { version = "0.4", features = ["serde"] }
rand = "0.9"
rand_chacha = "0.9"
rand_distr = "0.5"
clap = { version = "4", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
libm = "0.2"

[features]
default = ["precision-bigfloat"]
gpu = ["cudarc", "pwos-math/cuda"]
# High-precision (~150-digit) comparator layer for the chain matcher and
# any downstream eigenvalue-ratio analysis. Routes through
# `pwos_math::precision::BigFloat` (astro-float).
precision-bigfloat = []

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
